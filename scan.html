<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
  <!-- 引入 Tesseract.js：用於 OCR 文字辨識（免付費） -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <title>掃描記帳 PWA</title>
</head>
<body>
  <header class="app-header">
    <h1>掃描記帳</h1>
    <p class="subtitle">拍照或貼上連結即可完成流水帳務</p>
  </header>
  <main>
    <!-- 拍照或選擇圖片區 -->
    <section id="capture-section" class="card">
      <h2>步驟 1 ：拍照 / 上傳物流單</h2>
      <input type="file" id="inputFile" accept="image/*" capture="environment">
      <div class="preview-container">
        <img id="preview" alt="預覽圖" style="display:none;" />
        <video id="videoPreview" autoplay playsinline style="display:none;"></video>
      </div>
      <button id="toggleCameraBtn" class="secondary-btn">使用相機</button>
    </section>

    <!-- OCR 結果與表單區 -->
    <section id="result-section" class="card" style="display:none;">
      <h2>步驟 2 ：確認資料</h2>
      <label class="form-field">擷取的原始文字
        <textarea id="ocrOutput" rows="4" placeholder="擷取結果會顯示在此，請稍候…"></textarea>
      </label>
      <form id="entryForm" class="entry-form">
        <label class="form-field">商品名稱
          <input type="text" id="productName" required />
        </label>
        <label class="form-field">日期
          <input type="date" id="entryDate" required />
        </label>
        <label class="form-field">數量
          <input type="number" id="quantity" min="1" value="1" required />
        </label>
        <label class="form-field">金額
          <input type="number" id="amount" step="0.01" min="0" required />
        </label>
        <label class="form-field">物流單號 / 訂單編號
          <input type="text" id="orderNumber" />
        </label>
        <label class="form-field">連結
          <input type="url" id="orderLink" />
        </label>
      </form>
      <button id="saveBtn" class="primary-btn">儲存至 Notion</button>
      <p id="saveStatus" class="status"></p>
    </section>
  </main>

  <footer class="app-footer">
    <small>本應用為個人用途示範，使用 open-source 技術構建。</small>
  </footer>

  <!-- 主程式邏輯 -->
  <script>
    // 註冊 Service Worker 以支援離線功能
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch((err) => {
        console.error('Service worker registration failed:', err);
      });
    }

    const fileInput = document.getElementById('inputFile');
    const previewImg = document.getElementById('preview');
    const videoPreview = document.getElementById('videoPreview');
    const toggleCameraBtn = document.getElementById('toggleCameraBtn');
    const resultSection = document.getElementById('result-section');
    const ocrOutput = document.getElementById('ocrOutput');
    const saveBtn = document.getElementById('saveBtn');
    const saveStatus = document.getElementById('saveStatus');
    let cameraStream = null;

    /**
     * 啟用相機預覽
     */
    async function enableCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('您的瀏覽器不支援相機存取功能。');
        return;
      }
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        videoPreview.srcObject = cameraStream;
        videoPreview.style.display = 'block';
        previewImg.style.display = 'none';
        toggleCameraBtn.textContent = '拍照';
      } catch (err) {
        console.error(err);
        alert('無法開啟相機：' + err.message);
      }
    }

    /**
     * 從相機截圖
     */
    function captureFromCamera() {
      if (!cameraStream) return;
      const track = cameraStream.getVideoTracks()[0];
      const imageCapture = new ImageCapture(track);
      imageCapture.takePhoto().then(blob => {
        processImageBlob(blob);
      }).catch(err => {
        console.error(err);
      });
    }

    toggleCameraBtn.addEventListener('click', () => {
      if (!cameraStream) {
        enableCamera();
      } else {
        // 在相機模式下，當按鈕顯示拍照時觸發截圖
        captureFromCamera();
      }
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        processImageBlob(file);
      }
    });

    /**
     * 處理圖片 Blob：顯示預覽並進行 OCR
     */
    function processImageBlob(blob) {
      // 先將相機關閉
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
        videoPreview.srcObject = null;
        videoPreview.style.display = 'none';
        toggleCameraBtn.textContent = '使用相機';
      }
      // 預覽圖片
      const url = URL.createObjectURL(blob);
      previewImg.src = url;
      previewImg.style.display = 'block';
      // 顯示結果區塊
      resultSection.style.display = 'block';
      ocrOutput.value = '正在辨識文字，請稍候…';
      // 使用 Tesseract 進行文字辨識（中文 + 英文）
      Tesseract.recognize(blob, 'eng+chi_sim', {
        logger: m => console.log(m)
      }).then(({ data: { text } }) => {
        ocrOutput.value = text.trim();
        // 嘗試自動填入簡易欄位
        autoPopulateFields(text);
      }).catch(err => {
        console.error(err);
        ocrOutput.value = '辨識失敗：' + err.message;
      });
    }

    /**
     * 嘗試從 OCR 文字自動填入表單欄位
     */
    function autoPopulateFields(text) {
      const lines = text.split(/\n|\r/).map(l => l.trim()).filter(Boolean);
      // 先重置
      document.getElementById('productName').value = '';
      document.getElementById('entryDate').value = '';
      document.getElementById('quantity').value = '1';
      document.getElementById('amount').value = '';
      // 簡易規則：
      lines.forEach(line => {
        // 金額：找尋類似金額的片段（例如包含 $ 或數字）
        const amtMatch = line.match(/(?:NT\$?|\$)?\s*([0-9]+(?:\.[0-9]{1,2})?)/);
        if (amtMatch && !document.getElementById('amount').value) {
          document.getElementById('amount').value = amtMatch[1];
        }
        // 日期：符合 yyyy/mm/dd 或 yyyy-mm-dd 格式
        const dateMatch = line.match(/(\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2})/);
        if (dateMatch && !document.getElementById('entryDate').value) {
          // 轉成 ISO 格式
          const parts = dateMatch[1].replace(/\-/g, '/').split('/');
          if (parts.length === 3) {
            const isoDate = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
            document.getElementById('entryDate').value = isoDate;
          }
        }
      });
      // 第一行可能是商品名稱
      if (lines.length > 0) {
        document.getElementById('productName').value = lines[0];
      }
    }

    /**
     * 儲存資料到 Notion
     */
    saveBtn.addEventListener('click', async () => {
      saveStatus.textContent = '';
      const productName = document.getElementById('productName').value.trim();
      const entryDate = document.getElementById('entryDate').value;
      const quantity = document.getElementById('quantity').value;
      const amount = document.getElementById('amount').value;
      const orderNumber = document.getElementById('orderNumber').value.trim();
      const orderLink = document.getElementById('orderLink').value.trim();
      if (!productName || !entryDate || !quantity || !amount) {
        alert('請先完整填寫必填欄位。');
        return;
      }
      // 這裡的 databaseId 和 notionKey 必須由使用者自行填入
      const databaseId = 'REPLACE_WITH_YOUR_NOTION_DATABASE_ID';
      const notionKey = 'REPLACE_WITH_YOUR_NOTION_TOKEN';
      const payload = {
        parent: { database_id: databaseId },
        properties: {
          Name: {
            title: [ { text: { content: productName } } ]
          },
          日期: { date: { start: entryDate } },
          數量: { number: parseInt(quantity) },
          金額: { number: parseFloat(amount) },
          帳務名稱: { rich_text: [ { text: { content: productName } } ] },
          連結: orderLink ? { url: orderLink } : undefined,
          備註: orderNumber ? { rich_text: [ { text: { content: orderNumber } } ] } : undefined
        }
      };
      // 移除未填值的屬性
      Object.keys(payload.properties).forEach(key => {
        if (!payload.properties[key]) delete payload.properties[key];
      });
      try {
        const res = await fetch('https://api.notion.com/v1/pages', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${notionKey}`,
            'Notion-Version': '2022-06-28',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        saveStatus.textContent = '✅ 已成功儲存至 Notion！';
        saveStatus.classList.add('success');
      } catch (err) {
        console.error(err);
        saveStatus.textContent = '❌ 儲存失敗：' + err.message;
        saveStatus.classList.add('error');
      }
    });
  </script>
</body>
</html>
